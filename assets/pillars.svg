<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrp" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <rect width="920" height="300" fill="#ffffff"/>

  <!-- banner -->
  <rect x="20" y="18" width="880" height="44" rx="6" fill="#1f3a5f"/>
  <text x="46" y="46" fill="#ffffff" font-size="14">From operational support</text>
  <line x1="226" y1="40" x2="262" y2="40" stroke="#ffffff" stroke-width="2" marker-end="url(#arrp)"/>
  <text x="272" y="46" fill="#ffffff" font-size="14" font-weight="bold">to strategic GTM co-delivery</text>

  <!-- pillar 01 -->
  <rect x="20" y="86" width="280" height="44" rx="6" fill="#2e6da4"/>
  <text x="44" y="114" fill="#ffffff" font-size="20" font-weight="bold">01</text>
  <text x="86" y="114" fill="#ffffff" font-size="15" font-weight="bold">PIPELINE GENERATION</text>
  <rect x="20" y="138" width="280" height="142" rx="6" fill="#eef2f7" stroke="#2e6da4"/>
  <text x="36" y="166" fill="#243b53" font-size="12">Co-create qualified pipeline</text>
  <text x="36" y="186" fill="#243b53" font-size="12">with partners &#8212; building</text>
  <text x="36" y="206" fill="#243b53" font-size="12">business with them, not just</text>
  <text x="36" y="226" fill="#243b53" font-size="12">enabling them.</text>

  <!-- pillar 02 -->
  <rect x="320" y="86" width="280" height="44" rx="6" fill="#2e8b57"/>
  <text x="344" y="114" fill="#ffffff" font-size="20" font-weight="bold">02</text>
  <text x="386" y="114" fill="#ffffff" font-size="15" font-weight="bold">WIN RATE</text>
  <rect x="320" y="138" width="280" height="142" rx="6" fill="#eaf3ee" stroke="#2e8b57"/>
  <text x="336" y="166" fill="#1f5135" font-size="12">Lift win rate on partner-</text>
  <text x="336" y="186" fill="#1f5135" font-size="12">attached opportunities through</text>
  <text x="336" y="206" fill="#1f5135" font-size="12">credentialed capability and</text>
  <text x="336" y="226" fill="#1f5135" font-size="12">active co-selling.</text>

  <!-- pillar 03 -->
  <rect x="620" y="86" width="280" height="44" rx="6" fill="#d35400"/>
  <text x="644" y="114" fill="#ffffff" font-size="20" font-weight="bold">03</text>
  <text x="686" y="114" fill="#ffffff" font-size="15" font-weight="bold">DELIVERY EXCELLENCE</text>
  <rect x="620" y="138" width="280" height="142" rx="6" fill="#fbede3" stroke="#d35400"/>
  <text x="636" y="166" fill="#8a3700" font-size="12">Every implementation delivered</text>
  <text x="636" y="186" fill="#8a3700" font-size="12">by prepared, current, verifiably</text>
  <text x="636" y="206" fill="#8a3700" font-size="12">staffed partners &#8212; set up to</text>
  <text x="636" y="226" fill="#8a3700" font-size="12">succeed before the build begins.</text>
</svg>
