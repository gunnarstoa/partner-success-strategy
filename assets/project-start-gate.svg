<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>
  <rect width="840" height="340" fill="#ffffff"/>

  <!-- conditions -->
  <g font-size="13" fill="#243b53">
    <rect x="24" y="24"  width="320" height="40" rx="6" fill="#eef2f7" stroke="#2e6da4"/>
    <text x="40" y="49">1 &#183; SOW / contract executed</text>
    <rect x="24" y="80"  width="320" height="40" rx="6" fill="#eef2f7" stroke="#2e6da4"/>
    <text x="40" y="105">2 &#183; Validated delivery team onboarded</text>
    <rect x="24" y="136" width="320" height="40" rx="6" fill="#eef2f7" stroke="#2e6da4"/>
    <text x="40" y="161">3 &#183; Handoff package accepted</text>
    <rect x="24" y="192" width="320" height="40" rx="6" fill="#fbede3" stroke="#d35400" stroke-width="2"/>
    <text x="40" y="217">4 &#183; Client data access provisioned</text>
    <rect x="24" y="248" width="320" height="40" rx="6" fill="#eef2f7" stroke="#2e6da4"/>
    <text x="40" y="273">5 &#183; Kickoff held</text>
  </g>
  <text x="352" y="217" fill="#d35400" font-size="11" font-weight="bold">usually</text>
  <text x="352" y="231" fill="#d35400" font-size="11" font-weight="bold">the slowest</text>

  <!-- arrows to gate -->
  <g stroke="#5b6b7b">
    <line x1="344" y1="44"  x2="556" y2="150" marker-end="url(#arr3)"/>
    <line x1="344" y1="100" x2="556" y2="158" marker-end="url(#arr3)"/>
    <line x1="344" y1="156" x2="556" y2="166" marker-end="url(#arr3)"/>
    <line x1="430" y1="212" x2="556" y2="182" marker-end="url(#arr3)"/>
    <line x1="344" y1="268" x2="556" y2="198" marker-end="url(#arr3)"/>
  </g>

  <!-- gate node -->
  <rect x="560" y="120" width="252" height="100" rx="10" fill="#2e8b57" stroke="#1f5135"/>
  <text x="686" y="155" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">OFFICIAL START</text>
  <text x="686" y="182" fill="#eaf3ee" font-size="12" text-anchor="middle">All five are true.</text>
  <text x="686" y="200" fill="#eaf3ee" font-size="12" text-anchor="middle">Start date = the day the</text>
  <text x="686" y="216" fill="#eaf3ee" font-size="12" text-anchor="middle">last condition is met.</text>
</svg>
