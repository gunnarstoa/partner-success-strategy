<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>
  <rect width="780" height="380" fill="#ffffff"/>

  <!-- ascending steps -->
  <rect x="40"  y="244" width="210" height="92"  rx="8" fill="#cfe0ee" stroke="#2e6da4"/>
  <rect x="285" y="172" width="210" height="164" rx="8" fill="#8fb8d8" stroke="#2e6da4"/>
  <rect x="530" y="96"  width="210" height="240" rx="8" fill="#2e6da4" stroke="#1f3a5f"/>

  <!-- Project 1 -->
  <text x="145" y="270" fill="#1f3a5f" font-size="15" font-weight="bold" text-anchor="middle">Project 1</text>
  <text x="145" y="292" fill="#1f3a5f" font-size="12" text-anchor="middle">Prime: PS</text>
  <text x="145" y="308" fill="#1f3a5f" font-size="12" text-anchor="middle">Co-prime: Partner</text>
  <text x="145" y="326" fill="#1f3a5f" font-size="11" text-anchor="middle">PS demonstrates the playbook</text>

  <!-- Project 2 -->
  <text x="390" y="198" fill="#13314f" font-size="15" font-weight="bold" text-anchor="middle">Project 2</text>
  <text x="390" y="220" fill="#13314f" font-size="12" text-anchor="middle">Prime: Partner</text>
  <text x="390" y="236" fill="#13314f" font-size="12" text-anchor="middle">Co-prime: PS</text>
  <text x="390" y="254" fill="#13314f" font-size="11" text-anchor="middle">Partner leads, PS safety net</text>

  <!-- Project 3 -->
  <text x="635" y="124" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">Project 3</text>
  <text x="635" y="146" fill="#ffffff" font-size="12" text-anchor="middle">Prime: Partner</text>
  <text x="635" y="162" fill="#ffffff" font-size="12" text-anchor="middle">PS on call</text>
  <text x="635" y="180" fill="#e7eef5" font-size="11" text-anchor="middle">Partner owns the playbook</text>

  <!-- growth arrow -->
  <line x1="70" y1="350" x2="720" y2="74" stroke="#9aa7b4" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arr2)"/>
  <text x="395" y="372" fill="#2e8b57" font-size="13" font-weight="bold" text-anchor="middle">Partner independence increases &#8594;</text>
  <text x="118" y="60" fill="#d35400" font-size="13" font-weight="bold" text-anchor="middle">PS involvement decreases</text>
</svg>
